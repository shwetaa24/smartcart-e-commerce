name: SwiftCart CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Backend Image
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/swiftcart-backend:latest ./backend
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/swiftcart-backend:latest

    - name: Build and Push Frontend Image
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/swiftcart-frontend:latest ./frontend
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/swiftcart-frontend:latest

    - name: Deploy to AWS EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          mkdir -p ~/swiftcart

          # Write the .env file with RDS credentials
          cat > ~/swiftcart/.env << 'ENVEOF'
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_HOST=${{ secrets.DB_HOST }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_PORT=5432
          DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
          ENVEOF

          # Write the docker-compose.yml directly on the EC2
          cat > ~/swiftcart/docker-compose.yml << 'EOF'
          services:
            backend:
              image: ${{ secrets.DOCKERHUB_USERNAME }}/swiftcart-backend:latest
              container_name: swiftcart-backend
              restart: always
              ports:
                - "5001:5001"
              env_file:
                - .env

            frontend:
              image: ${{ secrets.DOCKERHUB_USERNAME }}/swiftcart-frontend:latest
              container_name: swiftcart-frontend
              restart: always
              ports:
                - "80:80"
              depends_on:
                - backend
          EOF

          cd ~/swiftcart

          # Pull latest images
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/swiftcart-backend:latest
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/swiftcart-frontend:latest

          # Stop old containers and start fresh
          docker compose down || true
          docker compose up -d
