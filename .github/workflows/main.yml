name: SwiftCart CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Backend Image
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/swiftcart-backend:latest ./backend
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/swiftcart-backend:latest

    - name: Build and Push Frontend Image
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/swiftcart-frontend:latest ./frontend
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/swiftcart-frontend:latest

    - name: Deploy to AWS EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          mkdir -p ~/swiftcart
          echo "DB_USER=${{ secrets.DB_USER }}" > ~/swiftcart/.env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> ~/swiftcart/.env
          echo "DB_HOST=${{ secrets.DB_HOST }}" >> ~/swiftcart/.env
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> ~/swiftcart/.env
          echo "DB_PORT=5432" >> ~/swiftcart/.env
          
          cd ~/swiftcart
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/swiftcart-backend:latest
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/swiftcart-frontend:latest
          docker compose up -d --force-recreate
