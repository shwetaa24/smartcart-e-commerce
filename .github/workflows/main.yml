name: SwiftCart CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Backend Image
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/swiftcart-backend:latest ./backend
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/swiftcart-backend:latest

    - name: Build and Push Frontend Image
      run: |
        docker build \
          --build-arg VITE_API_URL=http://${{ secrets.EC2_HOST }} \
          -t ${{ secrets.DOCKERHUB_USERNAME }}/swiftcart-frontend:latest \
          ./frontend
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/swiftcart-frontend:latest

    - name: Deploy to AWS EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # ── Step 1: Install Docker if not present ──────────────────────
          if ! command -v docker &> /dev/null; then
            echo "Installing Docker..."
            sudo apt-get update -y
            sudo apt-get install -y docker.io docker-compose-plugin
            sudo systemctl start docker
            sudo systemctl enable docker
            sudo usermod -aG docker ubuntu
          fi

          # ── Step 2: Ensure docker compose (v2) works ───────────────────
          if ! docker compose version &> /dev/null; then
            sudo apt-get install -y docker-compose-plugin
          fi

          # ── Step 3: Create project directory ───────────────────────────
          mkdir -p ~/swiftcart
          cd ~/swiftcart

          # ── Step 4: Write RDS environment variables ─────────────────────
          cat > .env << 'ENVEOF'
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_HOST=${{ secrets.DB_HOST }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_PORT=5432
          ENVEOF

          # ── Step 5: Write docker-compose.yml ────────────────────────────
          cat > docker-compose.yml << 'COMPOSEEOF'
          services:
            backend:
              image: ${{ secrets.DOCKERHUB_USERNAME }}/swiftcart-backend:latest
              container_name: swiftcart-backend
              restart: always
              ports:
                - "5001:5001"
              env_file:
                - .env

            frontend:
              image: ${{ secrets.DOCKERHUB_USERNAME }}/swiftcart-frontend:latest
              container_name: swiftcart-frontend
              restart: always
              ports:
                - "80:80"
              depends_on:
                - backend
          COMPOSEEOF

          # ── Step 6: Pull latest images & restart containers ─────────────
          sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/swiftcart-backend:latest
          sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/swiftcart-frontend:latest
          sudo docker compose down || true
          sudo docker compose up -d

          echo "✅ SwiftCart deployed at http://${{ secrets.EC2_HOST }}"
